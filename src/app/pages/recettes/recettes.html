<div class="recipes-page-container">

  <div class="recipes-content">

    <!-- Filtres (affichés seulement si showFilters = true) -->
    <div class="filters-container" *ngIf="showFilters">

      <h2 class="filters-title">Filtrer</h2>

      <!-- Groupes de filtres -->
      <div class="filtre-group">
        <div class="filtre-label">⭐ Type de plat</div>
        <div class="filtre-options">
          <button class="filtre-btn">Entrée</button>
          <button class="filtre-btn">Plat principal</button>
          <button class="filtre-btn">Dessert</button>
          <button class="filtre-btn">Apéritif</button>
          <button class="filtre-btn">Soupe</button>
        </div>
      </div>

      <div class="filtre-group">
        <div class="filtre-label">⭐ Type de cuisine</div>
        <div class="filtre-options">
          <button class="filtre-btn" (click)="typeCuisine=''">Toutes</button>
          <button class="filtre-btn" (click)="typeCuisine='italien'">Italienne</button>
          <button class="filtre-btn" (click)="typeCuisine='français'">Française</button>
          <button class="filtre-btn" (click)="typeCuisine='asiatique'">Asiatique</button>
          <button class="filtre-btn" (click)="typeCuisine='américain'">Américaine</button>
          <button class="filtre-btn" (click)="typeCuisine='espagnol'">Espagnole</button>
        </div>
      </div>

      <div class="filtre-group">
        <div class="filtre-label">⭐ Mode de cuisson</div>
        <div class="filtre-options">
          <button class="filtre-btn" (click)="modeCuisson=''">Tous</button>
          <button class="filtre-btn" (click)="modeCuisson='four'">Au four</button>
          <button class="filtre-btn" (click)="modeCuisson='aucun'">Aucun</button>
          <button class="filtre-btn" (click)="modeCuisson='sauté/mijoté'">Sauté / Mijoté</button>
          <button class="filtre-btn" (click)="modeCuisson='poêle'">À la poêle</button>
          <button class="filtre-btn" (click)="modeCuisson='sauté/casserole'">Sauté / Casserole</button>
        </div>
      </div>

      <div class="filtre-group">
        <div class="filtre-label">⭐ Région</div>
        <div class="filtre-options">
          <button class="filtre-btn" (click)="region=''">Toutes</button>
          <button class="filtre-btn" (click)="region='Europe'">Europe</button>
          <button class="filtre-btn" (click)="region='Asie'">Asie</button>
          <button class="filtre-btn" (click)="region='Amérique'">Amérique</button>
        </div>
      </div>

      <div class="filtre-group">
        <div class="filtre-label">⭐ Sucré / Salé</div>
        <div class="filtre-options">
          <button class="filtre-btn" (click)="sucreSale=''">Tous</button>
          <button class="filtre-btn" (click)="sucreSale='salé'">Salé</button>
          <button class="filtre-btn" (click)="sucreSale='sucré'">Sucré</button>
        </div>
      </div>

    </div>

    <!-- Recettes (toujours visibles) -->
    <div class="recipes-block">
      <div class="recipes-grid">

        <div class="recipes-card"
             *ngFor="let recette of filteredRecettes"
             (click)="navigateToRecette(recette.id)">

          <img [src]="recette.image" [alt]="recette.description" class="recipes-image" />
          <div class="recipes-info">
            <p class="recipes-description">{{ recette.description }}</p>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
